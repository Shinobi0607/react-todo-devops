apiVersion: v1
kind: Service
metadata:
  name: todo-app-svc
  namespace: default
  labels:
    app: todo-app
spec:
  selector:
    app: todo-app           # Routes traffic to pods with this label
  ports:
    - protocol: TCP
      port: 80              # Service port
      targetPort: 80        # Container port
  type: ClusterIP           # Internal only; Ingress handles external traffic
